<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Little Meteo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container-fluid py-4 px-4">

    <div class="text-center mb-4">
      <h1>Little Meteo</h1>
      <p class="text-muted">Inserisci la città di cui vuoi visualizzare il meteo</p>
    </div>

    <!-- Search form: inizialmente centrata, poi spostata via JS nel left-col -->
    <div id="search-center" class="row justify-content-center mb-4">
      <div class="col-md-5 col-lg-4">
        <div id="search-form">
          <input type="text" placeholder="Città" class="form-control input_text mb-2">
          <button class="btn btn-primary w-100 submit">Cerca</button>
          <div class="mt-3">
            <small class="text-muted">Opzionale: codice paese (es. IT, US, CA)</small>
            <input type="text" placeholder="Codice paese (es. IT)" class="form-control country_text mt-1">
          </div>
        </div>
      </div>
    </div>

    <!-- Layout a due colonne: nascosto finché non arriva il primo risultato -->
    <div id="main-row" class="row g-4 d-none">

      <div class="col-lg-5" id="left-col">
        <!-- #search-form verrà spostato qui via JS -->
        <div id="results" class="mt-3"></div>
      </div>

      <div class="col-lg-7" id="right-col">
        <div id="map-section">
          <div id="map-controls" class="mb-2" style="display:none;">
            <label class="form-label fw-bold">Visualizza sulla mappa:</label>
            <select class="form-select" id="city-select"></select>
          </div>
          <div id="map"></div>
        </div>
      </div>

    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
